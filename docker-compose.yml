version: '1'
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - gyan_bhandar_network
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=myapp
    networks:
      - gyan_bhandar_network

networks:
  gyan_bhandar_network:
    driver: bridge