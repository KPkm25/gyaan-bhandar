# Requires: Metrics Server installed
# Install: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gyan-bhandar-backend-hpa
  namespace: gyaan-bhandar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gyan-bhandar-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gyan-bhandar-frontend-hpa
  namespace: gyaan-bhandar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gyan-bhandar-frontend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
          