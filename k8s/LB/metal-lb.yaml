# Requires: MetalLB installed first
# Install:
#   kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.5/config/manifests/metallb-native.yaml
#   Wait for pods: kubectl wait --namespace metallb-system --for=condition=ready pod --selector=app=metallb --timeout=90s
#
# IMPORTANT: Replace the address range below with an unused IP range on your VMware LAN.
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: gyan-bhandar-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.24.100-192.168.24.100
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: gyan-bhandar-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - gyan-bhandar-pool
    