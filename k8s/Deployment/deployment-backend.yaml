apiVersion: apps/v1
kind: Deployment
metadata:
  name: gyan-bhandar-backend
  namespace: gyaan-bhandar
  labels:
    app: gyan-bhandar-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gyan-bhandar-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gyan-bhandar-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      volumes:
        - name: faiss-store
          persistentVolumeClaim:
            claimName: faiss-store-pvc
        - name: chat-history
          persistentVolumeClaim:
            claimName: chat-history-pvc
        - name: documents
          persistentVolumeClaim:
            claimName: documents-pvc
        - name: model
          persistentVolumeClaim:
            claimName: model-pvc
      imagePullSecrets:
        - name: dockerhub-secret
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              if [ -f /model/config.json ]; then
                echo "Model already exists, skipping download."
                exit 0
              fi
              echo "Installing sentence-transformers..."
              pip install sentence-transformers==2.7.0 --quiet --no-cache-dir
              echo "Downloading model..."
              python -c "
              from sentence_transformers import SentenceTransformer
              m = SentenceTransformer('all-MiniLM-L6-v2')
              m.save('/model')
              print('Model saved successfully.')
              "
          volumeMounts:
            - mountPath: /model
              name: model
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      containers:
        - name: gyan-bhandar-backend
          image: kpkm25/gyan-bhandar-backend:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1.5Gi"
          envFrom:
            - configMapRef:
                name: gyan-config
            - secretRef:
                name: gyan-secrets
          volumeMounts:
            - mountPath: /app/faiss_store
              name: faiss-store
            - mountPath: /app/chat_history
              name: chat-history
            - mountPath: /app/documents
              name: documents
            - mountPath: /app/all-MiniLM-L6-v2
              name: model
          startupProbe:
            httpGet:
              path: /startup
              port: 5000
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            