apiVersion: apps/v1
kind: Deployment
metadata:
  name: gyan-bhandar-frontend
  namespace: gyaan-bhandar
  labels:
    app: gyan-bhandar-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gyan-bhandar-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gyan-bhandar-frontend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: gyan-bhandar-frontend
          image: kpkm25/gyaan-bhandar-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: gyan-config
            - secretRef:
                name: gyan-secrets
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            