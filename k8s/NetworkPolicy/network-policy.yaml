# Only allow frontend to talk to backend; block all other inter-pod traffic
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: gyaan-bhandar
spec:
  podSelector:
    matchLabels:
      app: gyan-bhandar-backend
  policyTypes:
    - Ingress
  ingress:
    # Allow frontend pods directly (server-side calls)
    - from:
        - podSelector:
            matchLabels:
              app: gyan-bhandar-frontend
      ports:
        - protocol: TCP
          port: 5000
    # Allow Ingress Controller traffic — K3s routes through node IP, not pod IP
    # so namespace selector alone doesn't work; need to allow by CIDR instead
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16        # K3s pod network CIDR
        - ipBlock:
            cidr: 192.168.24.0/24     # VMware LAN
      ports:
        - protocol: TCP
          port: 5000
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 5000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: gyaan-bhandar
spec:
  podSelector:
    matchLabels:
      app: gyan-bhandar-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - ipBlock:
            cidr: 10.42.0.0/16
        - ipBlock:
            cidr: 192.168.24.0/24
      ports:
        - protocol: TCP
          port: 80